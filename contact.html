<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - OceanBlue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
    <!-- Iconify -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
</head>

<body class="bg-slate-50 text-slate-800">

    <nav class="sticky top-0 w-full z-50 bg-white/95 backdrop-blur shadow-sm transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <a href="index.html" class="flex-shrink-0 flex items-center gap-2">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg animate__animated animate__pulse animate__infinite">
                    </div>
                    <span class="font-bold text-2xl text-slate-900 tracking-tight">Ocean<span
                            class="text-blue-600">Blue</span></span>
                </a>
                
                
                <div class="hidden md:flex space-x-8 font-medium text-sm">
                    <a href="index.html" class="text-slate-600 hover:text-blue-600 transition-colors">Home</a>
                    <a href="rooms.html" class="text-slate-600 hover:text-blue-600 transition-colors">Rooms</a>
                    <a href="dining.html" class="text-slate-600 hover:text-blue-600 transition-colors">Dining</a>
                    <a href="spa.html" class="text-slate-600 hover:text-blue-600 transition-colors">Spa</a>
                    <a href="events.html" class="text-slate-600 hover:text-blue-600 transition-colors">Events</a>
                    <a href="contact.html" class="text-slate-600 hover:text-blue-600 transition-colors">Contact</a>
                </div>
                <div class="flex items-center gap-3">
                    <div id="google_translate_element" class="hidden lg:block overflow-hidden rounded-md h-8 mt-1"></div>
                    <select id="currency-selector" class="bg-slate-50 border border-slate-200 text-slate-700 text-xs font-medium rounded-md focus:ring-blue-500 focus:border-blue-500 block py-2 px-1 cursor-pointer outline-none hidden sm:block">
                        <option value="USD">USD ($)</option>
                        <option value="EUR">EUR (€)</option>
                        <option value="GBP">GBP (£)</option>
                        <option value="JPY">JPY (¥)</option>
                    </select>
                    <a href="booking.html"
                        class="bg-blue-600 text-white px-5 py-2.5 text-sm rounded-md font-medium hover:bg-blue-700 transition-all shadow-lg hover:shadow-blue-600/30 transform hover:-translate-y-0.5 whitespace-nowrap">Book
                        Now</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-16 animate__animated animate__fadeIn">
        <h1 class="text-4xl font-bold text-slate-900 mb-8 text-center">Get in Touch</h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

            <!-- Contact Info Sidebar -->
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                    <h3 class="font-bold text-slate-900 mb-1">Reservations</h3>
                    <p class="text-blue-600 font-medium">+1 (555) 123-4567</p>
                    <p class="text-sm text-slate-500">Available 24/7</p>
                </div>
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                    <h3 class="font-bold text-slate-900 mb-1">Email Support</h3>
                    <p class="text-blue-600 font-medium">info@oceanblue.com</p>
                    <p class="text-sm text-slate-500">We aim to reply within 2 hours</p>
                </div>
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                    <h3 class="font-bold text-slate-900 mb-1">Hotel Address</h3>
                    <p class="text-slate-600 text-sm">123 Blue Avenue<br>Business District<br>City Center, 10001</p>
                </div>
            </div>

            <!-- Contact Form & Map Area -->
            <div class="lg:col-span-2 bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                <!-- Map Placeholder -->
                <div class="h-64 bg-slate-200 relative">
                    <img src="https://images.unsplash.com/photo-1524661135-423995f22d0b?q=80&w=2074&auto=format&fit=crop"
                        class="w-full h-full object-cover opacity-80" alt="Map View">
                    <div class="absolute inset-0 flex items-center justify-center">
                        <span class="bg-slate-900 text-white px-4 py-2 rounded shadow-lg text-sm font-bold">Interactive
                            Map UI</span>
                    </div>
                </div>

                <div class="p-8">
                    <h3 class="text-2xl font-bold text-slate-900 mb-6">Send us a Message</h3>
                    <form class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm text-slate-600 mb-1">Name</label>
                                <input type="text"
                                    class="w-full border border-slate-300 rounded p-2.5 outline-none focus:border-blue-600">
                            </div>
                            <div>
                                <label class="block text-sm text-slate-600 mb-1">Email</label>
                                <input type="email"
                                    class="w-full border border-slate-300 rounded p-2.5 outline-none focus:border-blue-600">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm text-slate-600 mb-1">Subject</label>
                            <input type="text"
                                class="w-full border border-slate-300 rounded p-2.5 outline-none focus:border-blue-600">
                        </div>
                        <div>
                            <label class="block text-sm text-slate-600 mb-1">Message</label>
                            <textarea rows="4"
                                class="w-full border border-slate-300 rounded p-2.5 outline-none focus:border-blue-600 resize-none"></textarea>
                        </div>
                        <button type="button"
                            class="bg-blue-600 text-white px-8 py-3 rounded-lg font-bold hover:bg-blue-700 transition-colors shadow-md">Send
                            Message</button>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <!-- Google Translate Script -->
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <!-- Custom Scripts (Currency & Translate) -->
    <script src="js/scripts.js"></script>
</body>

</html>
