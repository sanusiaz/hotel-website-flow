<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Reservation - OceanBlue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800">

    <nav class="bg-white border-b border-slate-200 py-4">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <a href="index.html" class="flex-shrink-0 flex items-center gap-2">
                <div class="w-6 h-6 bg-blue-600 rounded"></div>
                <span class="font-bold text-xl text-slate-900 tracking-tight">Ocean<span
                        class="text-blue-600">Blue</span></span>
            </a>
            <span class="text-sm font-medium text-slate-500">Secure Checkout <span
                    class="text-green-500 ml-1">🔒</span></span>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-12 grid grid-cols-1 md:grid-cols-3 gap-8 animate__animated animate__fadeIn">

        <!-- Guest & Payment Form -->
        <div class="md:col-span-2 space-y-8">
            <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-2xl font-bold text-slate-900 mb-6">Guest Details</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">First Name</label>
                        <input type="text"
                            class="w-full border border-slate-300 rounded-md p-2.5 focus:ring-2 focus:ring-blue-600 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Last Name</label>
                        <input type="text"
                            class="w-full border border-slate-300 rounded-md p-2.5 focus:ring-2 focus:ring-blue-600 outline-none">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                        <input type="email"
                            class="w-full border border-slate-300 rounded-md p-2.5 focus:ring-2 focus:ring-blue-600 outline-none">
                    </div>
                </div>
            </div>

            <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-2xl font-bold text-slate-900 mb-6">Payment Method</h2>
                <div class="space-y-4">
                    <div class="border border-blue-600 bg-blue-50 p-4 rounded-lg flex items-center gap-3">
                        <input type="radio" checked name="payment" class="w-4 h-4 text-blue-600">
                        <span class="font-medium text-blue-900">Credit / Debit Card</span>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mt-4">
                        <div class="col-span-2">
                            <label class="block text-sm font-medium text-slate-700 mb-1">Card Number</label>
                            <input type="text" placeholder="0000 0000 0000 0000"
                                class="w-full border border-slate-300 rounded-md p-2.5 focus:ring-2 focus:ring-blue-600 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Expiry Date</label>
                            <input type="text" placeholder="MM/YY"
                                class="w-full border border-slate-300 rounded-md p-2.5 focus:ring-2 focus:ring-blue-600 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">CVC</label>
                            <input type="text" placeholder="123"
                                class="w-full border border-slate-300 rounded-md p-2.5 focus:ring-2 focus:ring-blue-600 outline-none">
                        </div>
                    </div>
                </div>
            </div>

            <button
                class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition-colors shadow-lg hover:shadow-blue-600/30">Confirm
                & Pay $450.00</button>
        </div>

        <!-- Reservation Summary Sidebar -->
        <div class="bg-slate-900 text-white p-8 rounded-xl h-fit sticky top-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-6 border-b border-slate-700 pb-4">Reservation Summary</h3>
            <div class="mb-6">
                <p class="text-sm text-blue-400 font-semibold uppercase tracking-wider mb-1">Room</p>
                <p class="text-lg font-medium">Ocean View Suite</p>
            </div>
            <div class="flex justify-between mb-6">
                <div>
                    <p class="text-sm text-slate-400 mb-1">Check-in</p>
                    <p class="font-medium">Oct 12, 2026</p>
                </div>
                <div class="text-right">
                    <p class="text-sm text-slate-400 mb-1">Check-out</p>
                    <p class="font-medium">Oct 14, 2026</p>
                </div>
            </div>
            <div class="border-t border-slate-700 pt-6 space-y-3 text-sm">
                <div class="flex justify-between text-slate-300">
                    <span>$200 x 2 Nights</span>
                    <span>$400.00</span>
                </div>
                <div class="flex justify-between text-slate-300">
                    <span>Taxes & Fees</span>
                    <span>$50.00</span>
                </div>
                <div class="flex justify-between text-xl font-bold pt-4 border-t border-slate-700 text-white">
                    <span>Total</span>
                    <span>$450.00</span>
                </div>
            </div>
            <p class="text-xs text-slate-500 mt-6 text-center">By proceeding, you agree to our <a href="policies.html"
                    class="underline text-slate-400 hover:text-white">Terms & Conditions</a>.</p>
        </div>
    </div>
</body>

</html>
